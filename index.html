<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд Питания и Тренировок</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent: #4CAF50;
            --accent-hover: #45a049;
            --danger: #f44336;
            --primary: #2196F3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Global Stats Styles */
        .global-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-box {
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
        }

        .stat-box.success { border-color: var(--accent); }
        .stat-box.fire { border-color: #ff9800; }

        .stat-title {
            font-size: 0.9em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            margin: 5px 0;
        }

        /* Tabs Styles */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #e0e0e0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 4px rgba(33, 150, 243, 0.3);
        }

        /* Day Log Styles */
        .day-log {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .day-log:last-child {
            border-bottom: none;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .day-title {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--primary);
        }

        .day-badges {
            display: flex;
            gap: 10px;
            font-size: 0.85em;
        }

        .badge {
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .badge.cal { color: #d32f2f; background: #ffebee; }
        .badge.burn { color: #e65100; background: #fff3e0; }
        .badge.weight { color: #1b5e20; background: #e8f5e9; }

        .log-content {
            font-size: 0.95em;
            color: var(--text-muted);
        }

        .log-content p {
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Дашборд: Динамика результатов</h1>

    <div class="card" id="global-stats-container">
        <h2>🏆 Итоги за все время</h2>
        <div class="global-stats-grid" id="global-stats">
            </div>
        
        <div style="margin-top: 30px;">
            <canvas id="weightChart" height="100"></canvas>
        </div>
    </div>

    <div class="tabs" id="week-tabs">
        </div>

    <div class="card" id="week-content">
        </div>
</div>

<script>
// --- БАЗА ДАННЫХ (Сюда будете добавлять новые блоки недель) ---
const db = [
  {
    weekId: "week-1",
    title: "Неделя 1",
    stats: {
      avgCalories: 1535,
      avgProtein: 71,
      avgBurned: 767,
      currentWeight: 99.9,
      weightDifference: -2.48
    },
    days: [
      { id: "1-mon", calories: 1300, burned: 600, weight: 102.38, log: "<p><b>Старт дневника:</b> Фиксация начального веса и запуск дефицита.</p>" },
      { id: "1-tue", calories: 1400, burned: 700, log: "<p><b>Рацион:</b> Адаптация к новому режиму питания.</p>" },
      { id: "1-wed", calories: 1500, burned: 800, weight: 100.6, log: "<p><b>Промежуточный результат:</b> Первые отвесы и уход лишней воды.</p>" },
      { id: "1-thu", calories: 1600, burned: 900, log: "<p><b>Рацион:</b> Поддержание белка и клетчатки.</p>" },
      { id: "1-fri", calories: 1700, burned: 1000, weight: 99.9, log: "<p><b>Отличный финиш рабочей недели:</b> Пробита отметка в 100 кг!</p>" },
      { id: "1-sat", calories: 1800, burned: 1100, log: "<p><b>Выходной:</b> Активный отдых и восстановление.</p>" },
      { id: "1-sun", calories: 1445, burned: 269, log: "<p><b>Воскресенье:</b> Легкий день, подготовка ко второй неделе.</p>" }
    ]
  },
  {
    weekId: "week-2",
    title: "Неделя 2",
    stats: {
      avgCalories: 1464,
      avgProtein: 65,
      avgBurned: 500,
      currentWeight: 98.1,
      weightDifference: -0.8
    },
    days: [
      { id: "2-mon", calories: 1190, burned: 400, weight: 98.9, log: "<p><b>Понедельник:</b> Возвращение в ритм после выходных.</p>" },
      { id: "2-tue", calories: 1313, burned: 450, log: "<p><b>Вторник:</b> Стабильный дефицит и контроль порций.</p>" },
      { id: "2-wed", calories: 1406, burned: 500, weight: 98.5, log: "<p><b>Среда:</b> Экватор недели, вес продолжает падать.</p>" },
      { id: "2-thu", calories: 1576, burned: 550, log: "<p><b>Четверг:</b> Баланс макронутриентов и хорошая активность.</p>" },
      { id: "2-fri", calories: 1576, burned: 600, weight: 98.1, log: "<p><b>Пятница:</b> Отличный результат на весах к концу рабочей недели.</p>" },
      { id: "2-sat", calories: 1869, burned: 650, log: "<p><b>Суббота:</b> Небольшая углеводная загрузка для разгона метаболизма.</p>" },
      { id: "2-sun", calories: 1110, burned: 350, log: "<p><b>Воскресенье:</b> Разгрузочный день и отдых.</p>" }
    ]
  },
  {
    weekId: "week-3",
    title: "Неделя 3",
    stats: {
      avgCalories: 1634,
      avgProtein: 64,
      avgBurned: 845,
      currentWeight: 97.1,
      weightDifference: -1.5 
    },
    days: [
      { id: "3-mon", calories: 1350, burned: 1586, weight: 98.6, log: "<p><b>Завтрак:</b> Маш отварной 150г, Салат 120г, Сок.</p><p><b>Обед:</b> Булгур, Хек, Морковь, Кукуруза.</p><p><b>Ужин:</b> Салат, Килька.</p><p><b>Тренировка:</b> Протеин Herbalife 24.</p>" },
      { id: "3-tue", calories: 1484, burned: 400, log: "<p><b>Завтрак:</b> Гречка, Салат с тунцом, Шоколад.</p><p><b>Обед:</b> Булгур, Морковь, Салат с тунцом, Кешью.</p><p><b>Ужин:</b> Гречка, Семечки, Шоколад.</p>" },
      { id: "3-wed", calories: 1920, burned: 397, weight: 97.8, log: "<p><b>Завтрак:</b> Гречка, Морковь. <b>Перекусы:</b> Кешью, Банан, Квас.</p><p><b>Обед:</b> Онигири, Винегрет.</p><p><b>Ужин:</b> Картофель 244г, Салат, Тунец, Хлебцы.</p>" },
      { id: "3-thu", calories: 1623, burned: 496, log: "<p><b>Завтрак:</b> Гречка, тушеные овощи, салат, белая рыба.</p><p><b>Ужин:</b> Рис с овощами, Хек под овощами, Салат, Фисташки.</p>" },
      { id: "3-fri", calories: 2286, burned: 522, log: "<p><b>Завтрак:</b> Картофель по-селянски, салат, фрукты.</p><p><b>Обед:</b> Плов, Овощи на пару.</p><p><b>Ужин:</b> Веганский боул, Белое вино. <b>Перекусы:</b> Орехи, Креветки 70г.</p>" },
      { id: "3-sat", calories: 1578, burned: 1988, weight: 97.1, log: "<p><b>Завтрак:</b> Рис, Красная рыба, Руккола.</p><p><b>Обед:</b> Борщ постный. <b>Ужин:</b> Картошка, Селедка, Хек копченый, б/а пиво.</p><p><b>Перекусы:</b> Toblerone, Крабовые палочки, Протеин Herbalife 24.</p>" },
      { id: "3-sun", calories: 1199, burned: 527, log: "<p><b>Завтрак:</b> Рис, Винегрет, Хлебцы, Toblerone.</p><p><b>Обед:</b> Картофель, Салат.</p><p><b>Перекусы:</b> Квашеная капуста, Toblerone.</p>" }
    ]
  }
];
// -----------------------------------------------------------

// Логика отрисовки
document.addEventListener('DOMContentLoaded', () => {
    renderGlobalStats();
    renderTabs();
    renderChart();
    
    // Загружаем последнюю неделю по умолчанию
    if(db.length > 0) {
        renderWeek(db.length - 1);
    }
});

function renderGlobalStats() {
    let startWeight = 102.38; // Стартовый вес
    let currentWeight = db[db.length - 1].stats.currentWeight;
    let totalLoss = (startWeight - currentWeight).toFixed(2);
    
    let totalBurned = 0;
    let totalCals = 0;
    let daysCount = 0;

    db.forEach(week => {
        week.days.forEach(day => {
            totalBurned += day.burned;
            totalCals += day.calories;
            daysCount++;
        });
    });

    let avgCals = Math.round(totalCals / daysCount);

    const html = `
        <div class="stat-box success">
            <div class="stat-title">Сброшено всего</div>
            <div class="stat-value">-${totalLoss} кг</div>
            <div style="font-size: 0.8em; color: #666;">(${startWeight} ➔ ${currentWeight})</div>
        </div>
        <div class="stat-box fire">
            <div class="stat-title">Сожжено активностью</div>
            <div class="stat-value">${totalBurned} ккал</div>
            <div style="font-size: 0.8em; color: #666;">За ${daysCount} дней</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">Ср. потребление</div>
            <div class="stat-value">${avgCals} ккал</div>
            <div style="font-size: 0.8em; color: #666;">В день</div>
        </div>
    `;
    document.getElementById('global-stats').innerHTML = html;
}

function renderTabs() {
    const tabsContainer = document.getElementById('week-tabs');
    tabsContainer.innerHTML = '';
    
    db.forEach((week, index) => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${index === db.length - 1 ? 'active' : ''}`;
        btn.innerText = week.title;
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderWeek(index);
        };
        tabsContainer.appendChild(btn);
    });
}

function renderWeek(index) {
    const week = db[index];
    let html = `
        <h2 style="color: var(--primary); margin-top:0;">${week.title} — Итоги</h2>
        <div class="global-stats-grid" style="margin-bottom: 25px;">
            <div class="stat-box">
                <div class="stat-title">Вес за неделю</div>
                <div class="stat-value" style="color: var(--accent);">${week.stats.weightDifference > 0 ? '+' : ''}${week.stats.weightDifference} кг</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Ср. калории</div>
                <div class="stat-value">${week.stats.avgCalories}</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Ср. белок</div>
                <div class="stat-value">${week.stats.avgProtein} г</div>
            </div>
        </div>
        <h3>Дневник питания</h3>
    `;

    const dayNames = ["Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота", "Воскресенье"];
    
    week.days.forEach((day, i) => {
        const weightBadge = day.weight ? `<span class="badge weight">⚖️ ${day.weight} кг</span>` : '';
        html += `
            <div class="day-log">
                <div class="day-header">
                    <div class="day-title">${dayNames[i]}</div>
                    <div class="day-badges">
                        ${weightBadge}
                        <span class="badge burn">🔥 -${day.burned} ккал</span>
                        <span class="badge cal">🍽️ ${day.calories} ккал</span>
                    </div>
                </div>
                <div class="log-content">
                    ${day.log}
                </div>
            </div>
        `;
    });

    document.getElementById('week-content').innerHTML = html;
}

function renderChart() {
    const ctx = document.getElementById('weightChart').getContext('2d');
    const labels = [];
    const data = [];

    db.forEach(week => {
        week.days.forEach(day => {
            if(day.weight) {
                labels.push(week.title);
                data.push(day.weight);
            }
        });
    });

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Динамика веса (кг)',
                data: data,
                borderColor: '#4CAF50',
                backgroundColor: 'rgba(76, 175, 80, 0.1)',
                borderWidth: 3,
                tension: 0.3,
                fill: true,
                pointBackgroundColor: '#2196F3',
                pointRadius: 5
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: false } }
        }
    });
}
</script>

</body>
</html>
